<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms | Our Space</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-shell">
      <header class="top-nav">
        <a class="brand" href="home.html">
          <span class="brand-mark">✦</span>
          <span>Our Space</span>
        </a>
        <nav class="top-nav-links">
          <a href="home.html">Home</a>
          <a href="search.html">Search</a>
          <a href="notifications.html">Notifications</a>
          <a class="active" href="rooms.html">Rooms</a>
          <a href="profile.html">Profile</a>
        </nav>
      </header>

      <main class="main-content">
        <section class="panel glass">
          <div class="panel-head">
            <h3>Create room</h3>
            <p class="muted">Host a private group conversation.</p>
          </div>
          <label class="floating-field">
            <input id="roomName" type="text" placeholder=" " />
            <span>Room title</span>
          </label>
          <label class="floating-field">
            <input id="createPassword" type="password" placeholder=" " />
            <span>Room password</span>
          </label>
          <button id="createRoomBtn" class="primary-btn">Create room</button>
          <div id="roomCreated" class="room-created">
            <p class="muted">Room code</p>
            <h3 id="generatedRoomId">—</h3>
            <div class="button-row">
              <button id="copyRoomBtn" class="ghost-btn">Copy code</button>
              <button id="enterRoomBtn" class="secondary-btn">Open room</button>
            </div>
          </div>
        </section>

        <section class="panel glass">
          <div class="panel-head">
            <h3>Join room</h3>
            <p class="muted">Use a room code and password.</p>
          </div>
          <label class="floating-field">
            <input id="roomId" type="text" placeholder=" " />
            <span>Room code</span>
          </label>
          <label class="floating-field">
            <input id="joinPassword" type="password" placeholder=" " />
            <span>Room password</span>
          </label>
          <button id="joinRoomBtn" class="secondary-btn">Join room</button>
          <p id="status" class="status-text"></p>
        </section>
      </main>
    </div>

    <nav class="mobile-nav">
      <a href="home.html">Home</a>
      <a href="search.html">Search</a>
      <a href="chat.html">Chats</a>
      <a class="active" href="rooms.html">Rooms</a>
      <a href="profile.html">Profile</a>
    </nav>

    <script type="module" src="rooms.js"></script>
  </body>
</html>
